name: Docker Release (central hosting)

# Separate from release.yml (desktop app) on purpose: central/Docker
# hosting is an optional deployment path, not something every release
# needs. Uses its own tag prefix (server-v*) so a desktop-only release
# doesn't also publish a server image, and vice versa.
on:
  push:
    tags:
      - "server-v*"
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/schuetzenmanager-server
          tags: |
            type=match,pattern=server-v(.*),group=1
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: Rework
          file: Rework/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
