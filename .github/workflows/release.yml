name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "windows-latest"
          - platform: "ubuntu-22.04"
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libappindicator3-dev librsvg2-dev patchelf build-essential

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: Rework/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Install npm dependencies
        working-directory: Rework
        run: npm ci

      - name: Generate Prisma client (needed by prepare-sidecar)
        working-directory: Rework/apps/backend
        run: npm run prisma:generate

      - name: Prepare backend sidecar (build, stage node_modules, bundle Node runtime)
        working-directory: Rework/apps/desktop
        run: npm run prepare-sidecar

      - name: Build and publish Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: Rework/apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "SchützenManager ${{ github.ref_name }}"
          releaseBody: |
            Automatisch gebauter Release. Windows: MSI-Installer, NSIS-Setup (.exe) und ein portables ZIP. Linux: .deb und .AppImage.
          releaseDraft: true
          prerelease: false

      - name: Zip portable Windows build
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          # Needs the main exe, the bundled Node sidecar binary, and the
          # resources/backend folder side by side - a portable build runs
          # the sidecar exactly like the installed version does.
          $dest = "SchuetzenManager-portable-windows-x64.zip"
          $releaseDir = "Rework/apps/desktop/src-tauri/target/release"
          Compress-Archive -Path "$releaseDir/schuetzenmanager.exe", "$releaseDir/node-*.exe", "$releaseDir/resources" -DestinationPath $dest
          echo "PORTABLE_ZIP=$dest" >> $env:GITHUB_ENV

      - name: Upload portable Windows ZIP to release
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          draft: true
          files: ${{ env.PORTABLE_ZIP }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
