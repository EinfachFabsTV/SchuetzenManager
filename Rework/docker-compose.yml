services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: schuetzenmanager
      POSTGRES_PASSWORD: schuetzenmanager
      POSTGRES_DB: schuetzenmanager
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://schuetzenmanager:schuetzenmanager@db:5432/schuetzenmanager
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      - db

volumes:
  db-data:
